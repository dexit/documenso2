name: documenso

services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  database:
    image: postgres:15-alpine
    container_name: documenso-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-documenso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-documenso}
    volumes:
      - database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-documenso}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - documenso-internal

  # ─── Minio (S3-compatible storage) ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: documenso-minio
    restart: unless-stopped
    command: server /data --console-address ":9001" --address ":9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-documenso}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
    volumes:
      - minio:/data
    ports:
      - "9001:9001"   # Minio Console UI (admin)
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - documenso-internal
      - documenso-public

  # ─── Minio bucket initializer (one-shot) ────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: documenso-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-documenso}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
      MINIO_BUCKET: ${NEXT_PRIVATE_UPLOAD_BUCKET:-documenso}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/$${MINIO_BUCKET};
        mc anonymous set none local/$${MINIO_BUCKET};
        echo 'Minio bucket ready';
      "
    networks:
      - documenso-internal

  # ─── Documenso App ──────────────────────────────────────────────────────────
  documenso:
    build:
      context: .
      dockerfile: apps/remix/Dockerfile
    container_name: documenso-app
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      PORT: ${PORT:-3000}
      NODE_ENV: production

      # Auth
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET in .env}
      NEXT_PRIVATE_ENCRYPTION_KEY: ${NEXT_PRIVATE_ENCRYPTION_KEY:?Set NEXT_PRIVATE_ENCRYPTION_KEY in .env}
      NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY: ${NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY:?Set NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY in .env}

      # URLs
      NEXT_PUBLIC_WEBAPP_URL: ${NEXT_PUBLIC_WEBAPP_URL:-http://localhost:3000}
      NEXT_PRIVATE_INTERNAL_WEBAPP_URL: http://documenso:${PORT:-3000}

      # Database — points to the internal postgres container
      NEXT_PRIVATE_DATABASE_URL: postgres://${POSTGRES_USER:-documenso}:${POSTGRES_PASSWORD:-password}@database:5432/${POSTGRES_DB:-documenso}
      NEXT_PRIVATE_DIRECT_DATABASE_URL: postgres://${POSTGRES_USER:-documenso}:${POSTGRES_PASSWORD:-password}@database:5432/${POSTGRES_DB:-documenso}

      # Storage — Minio (S3 compatible)
      NEXT_PUBLIC_UPLOAD_TRANSPORT: s3
      NEXT_PRIVATE_UPLOAD_ENDPOINT: http://minio:9000
      NEXT_PRIVATE_UPLOAD_FORCE_PATH_STYLE: "true"
      NEXT_PRIVATE_UPLOAD_REGION: ${NEXT_PRIVATE_UPLOAD_REGION:-us-east-1}
      NEXT_PRIVATE_UPLOAD_BUCKET: ${NEXT_PRIVATE_UPLOAD_BUCKET:-documenso}
      NEXT_PRIVATE_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-documenso}
      NEXT_PRIVATE_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-password123}

      # SMTP
      NEXT_PRIVATE_SMTP_TRANSPORT: ${NEXT_PRIVATE_SMTP_TRANSPORT:-smtp-auth}
      NEXT_PRIVATE_SMTP_HOST: ${NEXT_PRIVATE_SMTP_HOST:-}
      NEXT_PRIVATE_SMTP_PORT: ${NEXT_PRIVATE_SMTP_PORT:-587}
      NEXT_PRIVATE_SMTP_USERNAME: ${NEXT_PRIVATE_SMTP_USERNAME:-}
      NEXT_PRIVATE_SMTP_PASSWORD: ${NEXT_PRIVATE_SMTP_PASSWORD:-}
      NEXT_PRIVATE_SMTP_SECURE: ${NEXT_PRIVATE_SMTP_SECURE:-false}
      NEXT_PRIVATE_SMTP_FROM_NAME: ${NEXT_PRIVATE_SMTP_FROM_NAME:-Documenso}
      NEXT_PRIVATE_SMTP_FROM_ADDRESS: ${NEXT_PRIVATE_SMTP_FROM_ADDRESS:-noreply@example.com}

      # Signing
      NEXT_PRIVATE_SIGNING_TRANSPORT: ${NEXT_PRIVATE_SIGNING_TRANSPORT:-local}
      NEXT_PRIVATE_SIGNING_LOCAL_FILE_PATH: /opt/documenso/cert.p12
      NEXT_PRIVATE_SIGNING_PASSPHRASE: ${NEXT_PRIVATE_SIGNING_PASSPHRASE:-}

      # Optional
      NEXT_PRIVATE_GOOGLE_CLIENT_ID: ${NEXT_PRIVATE_GOOGLE_CLIENT_ID:-}
      NEXT_PRIVATE_GOOGLE_CLIENT_SECRET: ${NEXT_PRIVATE_GOOGLE_CLIENT_SECRET:-}
      NEXT_PUBLIC_DOCUMENT_SIZE_UPLOAD_LIMIT: ${NEXT_PUBLIC_DOCUMENT_SIZE_UPLOAD_LIMIT:-50}
      NEXT_PRIVATE_DOCUMENSO_LICENSE_KEY: ${NEXT_PRIVATE_DOCUMENSO_LICENSE_KEY:-}
    volumes:
      - /opt/documenso/cert.p12:/opt/documenso/cert.p12:ro
    expose:
      - "${PORT:-3000}"
    networks:
      - documenso-internal
      - documenso-public

  # ─── Nginx Proxy Manager ────────────────────────────────────────────────────
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: documenso-nginx
    restart: unless-stopped
    depends_on:
      - documenso
    ports:
      - "80:80"       # HTTP (also used by Let's Encrypt HTTP challenge)
      - "443:443"     # HTTPS
      - "81:81"       # NPM Admin UI — access at http://<host>:81
    environment:
      # Disable SQLite in favor of keeping it simple (SQLite is default)
      DB_SQLITE_FILE: /data/database.sqlite
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - documenso-public

volumes:
  database:
  minio:
  npm-data:
  npm-letsencrypt:

networks:
  # Internal network — db, minio, and app communicate here (not exposed)
  documenso-internal:
    driver: bridge
  # Public network — nginx proxy manager routes to documenso
  documenso-public:
    driver: bridge
