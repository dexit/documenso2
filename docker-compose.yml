name: documenso

# ─── Shared environment for the app & worker ───────────────────────────────
x-documenso-env: &documenso-env
  NODE_ENV: production
  PORT: ${PORT:-3000}

  # Auth / Encryption
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET in .env}
  NEXT_PRIVATE_ENCRYPTION_KEY: ${NEXT_PRIVATE_ENCRYPTION_KEY:?Set NEXT_PRIVATE_ENCRYPTION_KEY in .env}
  NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY: ${NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY:?Set NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY in .env}

  # URLs
  NEXT_PUBLIC_WEBAPP_URL: ${NEXT_PUBLIC_WEBAPP_URL:-http://localhost:3000}
  NEXT_PRIVATE_INTERNAL_WEBAPP_URL: http://documenso:${PORT:-3000}

  # Database — points to internal postgres container
  NEXT_PRIVATE_DATABASE_URL: postgres://${POSTGRES_USER:-documenso}:${POSTGRES_PASSWORD:-password}@database:5432/${POSTGRES_DB:-documenso}
  NEXT_PRIVATE_DIRECT_DATABASE_URL: postgres://${POSTGRES_USER:-documenso}:${POSTGRES_PASSWORD:-password}@database:5432/${POSTGRES_DB:-documenso}

  # Storage — Minio (S3 compatible)
  NEXT_PUBLIC_UPLOAD_TRANSPORT: s3
  NEXT_PRIVATE_UPLOAD_ENDPOINT: http://minio:9000
  NEXT_PRIVATE_UPLOAD_FORCE_PATH_STYLE: 'true'
  NEXT_PRIVATE_UPLOAD_REGION: ${NEXT_PRIVATE_UPLOAD_REGION:-us-east-1}
  NEXT_PRIVATE_UPLOAD_BUCKET: ${NEXT_PRIVATE_UPLOAD_BUCKET:-documenso}
  NEXT_PRIVATE_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-documenso}
  NEXT_PRIVATE_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-password123}

  # Jobs — BullMQ via Redis (set to 'inngest' to use Inngest cloud instead)
  NEXT_PRIVATE_JOBS_PROVIDER: ${NEXT_PRIVATE_JOBS_PROVIDER:-bullmq}
  NEXT_PRIVATE_REDIS_URL: redis://redis:6379
  NEXT_PRIVATE_REDIS_PREFIX: ${NEXT_PRIVATE_REDIS_PREFIX:-documenso}
  NEXT_PRIVATE_BULLMQ_CONCURRENCY: ${NEXT_PRIVATE_BULLMQ_CONCURRENCY:-10}

  # Inngest (optional — only used when NEXT_PRIVATE_JOBS_PROVIDER=inngest)
  NEXT_PRIVATE_INNGEST_EVENT_KEY: ${NEXT_PRIVATE_INNGEST_EVENT_KEY:-}
  INNGEST_EVENT_KEY: ${NEXT_PRIVATE_INNGEST_EVENT_KEY:-}

  # SMTP
  NEXT_PRIVATE_SMTP_TRANSPORT: ${NEXT_PRIVATE_SMTP_TRANSPORT:-smtp-auth}
  NEXT_PRIVATE_SMTP_HOST: ${NEXT_PRIVATE_SMTP_HOST:-}
  NEXT_PRIVATE_SMTP_PORT: ${NEXT_PRIVATE_SMTP_PORT:-587}
  NEXT_PRIVATE_SMTP_USERNAME: ${NEXT_PRIVATE_SMTP_USERNAME:-}
  NEXT_PRIVATE_SMTP_PASSWORD: ${NEXT_PRIVATE_SMTP_PASSWORD:-}
  NEXT_PRIVATE_SMTP_SECURE: ${NEXT_PRIVATE_SMTP_SECURE:-false}
  NEXT_PRIVATE_SMTP_FROM_NAME: ${NEXT_PRIVATE_SMTP_FROM_NAME:-Documenso}
  NEXT_PRIVATE_SMTP_FROM_ADDRESS: ${NEXT_PRIVATE_SMTP_FROM_ADDRESS:-noreply@example.com}

  # Signing
  NEXT_PRIVATE_SIGNING_TRANSPORT: ${NEXT_PRIVATE_SIGNING_TRANSPORT:-local}
  NEXT_PRIVATE_SIGNING_LOCAL_FILE_PATH: /opt/documenso/cert.p12
  NEXT_PRIVATE_SIGNING_PASSPHRASE: ${NEXT_PRIVATE_SIGNING_PASSPHRASE:-}

  # License & billing
  NEXT_PRIVATE_DOCUMENSO_LICENSE_KEY: ${NEXT_PRIVATE_DOCUMENSO_LICENSE_KEY:-}
  NEXT_PRIVATE_SUPER_BYPASS_LICENSE: ${NEXT_PRIVATE_SUPER_BYPASS_LICENSE:-false}

  # Optional
  NEXT_PRIVATE_GOOGLE_CLIENT_ID: ${NEXT_PRIVATE_GOOGLE_CLIENT_ID:-}
  NEXT_PRIVATE_GOOGLE_CLIENT_SECRET: ${NEXT_PRIVATE_GOOGLE_CLIENT_SECRET:-}
  NEXT_PUBLIC_DOCUMENT_SIZE_UPLOAD_LIMIT: ${NEXT_PUBLIC_DOCUMENT_SIZE_UPLOAD_LIMIT:-50}

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  database:
    image: postgres:15-alpine
    container_name: documenso-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-documenso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-documenso}
    volumes:
      - database:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-documenso}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal # DB never exposed to outside — accessed via container name

  # ─── Redis (BullMQ backend) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: documenso-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Minio (S3-compatible object storage) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: documenso-minio
    restart: unless-stopped
    command: server /data --console-address ":9001" --address ":9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-documenso}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
      # Tell Minio its public console URL (used for redirects in the UI)
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-http://localhost:9001}
    volumes:
      - minio:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - internal # Port 9000 (S3 API) and 9001 (console) accessible inside

  # ─── Minio bucket initializer (one-shot) ────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: documenso-minio-init
    restart: 'no'
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-documenso}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
      MINIO_BUCKET: ${NEXT_PRIVATE_UPLOAD_BUCKET:-documenso}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/$${MINIO_BUCKET};
        mc anonymous set none local/$${MINIO_BUCKET};
        echo 'Minio bucket ready';
      "
    networks:
      - internal

  # ── Application ────────────────────────────────────────────────────────────

  # ─── Documenso App ──────────────────────────────────────────────────────────
  documenso:
    build:
      context: .
      dockerfile: apps/remix/Dockerfile
    container_name: documenso-app
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: *documenso-env
    volumes:
      - /opt/documenso/cert.p12:/opt/documenso/cert.p12:ro
    expose:
      - '${PORT:-3000}' # Only reachable inside Docker — NPM proxies from outside
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:${PORT:-3000}/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── BullMQ Worker (optional) ───────────────────────────────────────────────
  #
  # Start with: docker compose --profile worker up -d
  #
  worker:
    build:
      context: .
      dockerfile: apps/remix/Dockerfile
    container_name: documenso-worker
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *documenso-env
      WORKER_ONLY: 'true'
    command: ['node', 'worker.js']
    volumes:
      - /opt/documenso/cert.p12:/opt/documenso/cert.p12:ro
    networks:
      - internal
    profiles:
      - worker

  # ─── Inngest Dev Server (optional) ──────────────────────────────────────────
  #
  # Only when NEXT_PRIVATE_JOBS_PROVIDER=inngest.
  # Start with: docker compose --profile inngest up -d
  #
  inngest:
    image: inngest/inngest:latest
    container_name: documenso-inngest
    restart: unless-stopped
    command: inngest dev --host 0.0.0.0 --port 8288 --no-discovery
    expose:
      - '8288'
    environment:
      INNGEST_DEV: '1'
    networks:
      - internal
    profiles:
      - inngest

  # ── Proxy & Ingress ────────────────────────────────────────────────────────

  # ─── Nginx Proxy Manager ────────────────────────────────────────────────────
  #
  # The single ingress point for all HTTP/HTTPS traffic.
  # On first boot the npm-init service will auto-create proxy hosts.
  #
  # Admin UI:  http://<host>:81
  #   First-boot login: NPM_ADMIN_EMAIL / NPM_ADMIN_PASSWORD (see .env)
  #   Default fallback: admin@example.com / changeme
  #
  # Ports exposed to the host:
  #   80  → HTTP (Let's Encrypt HTTP-01 challenge + redirect to HTTPS)
  #   443 → HTTPS (SSL termination)
  #   81  → NPM Admin UI (consider firewalling this in production)
  #
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: documenso-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ['CMD', '/usr/bin/check-health']
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - internal # Can reach all backend services by container name
      - public # Faces the host/internet

  # ─── Nginx Proxy Manager — auto-configuration (one-shot) ────────────────────
  #
  # Runs once after NPM is healthy and seeds it with proxy hosts for:
  #   DOCUMENSO_DOMAIN → documenso:3000
  #   MINIO_DOMAIN     → minio:9001 (console)
  #   STATUS_DOMAIN    → uptime-kuma:3001
  #   NPM_DOMAIN       → nginx-proxy-manager:81 (admin on a clean domain)
  #
  # Leave a domain blank in .env to skip creating that proxy host.
  # This container exits after first run — re-run with: docker compose run npm-init
  #
  npm-init:
    image: alpine/curl:latest
    container_name: documenso-npm-init
    restart: 'no'
    depends_on:
      nginx-proxy-manager:
        condition: service_healthy
    environment:
      NPM_ADMIN_EMAIL: ${NPM_ADMIN_EMAIL:-admin@example.com}
      NPM_ADMIN_PASSWORD: ${NPM_ADMIN_PASSWORD:-changeme}
      PORT: ${PORT:-3000}
      DOCUMENSO_DOMAIN: ${DOCUMENSO_DOMAIN:-}
      MINIO_DOMAIN: ${MINIO_DOMAIN:-}
      STATUS_DOMAIN: ${STATUS_DOMAIN:-}
      NPM_DOMAIN: ${NPM_DOMAIN:-}
    volumes:
      - ./docker/npm-init.sh:/npm-init.sh:ro
    entrypoint: ['/bin/sh', '/npm-init.sh']
    networks:
      - internal

  # ── Monitoring ─────────────────────────────────────────────────────────────

  # ─── Uptime Kuma ────────────────────────────────────────────────────────────
  #
  # Service health monitoring — similar to Checkmate / Uptime Robot.
  # Monitors HTTP endpoints, TCP ports, Docker container states, and more.
  #
  # Access via:  http://<host>:3001  (direct)
  #              https://STATUS_DOMAIN (through NPM — configured by npm-init)
  #
  # On first boot: create an admin account at the web UI.
  #
  # Pre-configured monitors (set up in the UI after first boot):
  #   • Documenso health  → http://documenso:3000/api/health
  #   • Minio S3 API      → http://minio:9000/minio/health/live
  #   • Redis             → TCP redis:6379
  #   • PostgreSQL        → TCP database:5432
  #   • NPM               → http://nginx-proxy-manager:81/api/
  #
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: documenso-uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro # Docker container monitoring
    expose:
      - '3001' # Proxied through NPM — direct port exposed below for initial setup
    ports:
      - '3001:3001' # Remove this after NPM is configured with STATUS_DOMAIN
    networks:
      - internal # Can reach all services for health checks
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3001 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  database:
  redis:
  minio:
  npm-data:
  npm-letsencrypt:
  uptime-kuma:

networks:
  # Internal — all services communicate here; never directly exposed to host
  internal:
    driver: bridge
    internal: false # Set to true if you want strict isolation (breaks Let's Encrypt)

  # Public — only NPM sits here; it bridges to internal services
  public:
    driver: bridge
